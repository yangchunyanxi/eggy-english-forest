<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Eggy English Forest V5.2</title>
<style>
body{margin:0;background:#dff6d8;font-family:"Microsoft YaHei";text-align:center}
.box{max-width:520px;margin:20px auto;background:white;border-radius:30px;padding:25px}
.sunny{font-size:90px;animation:jump 1s infinite}
@keyframes jump{50%{transform:translateY(-20px)}}
button{width:85%;padding:14px;margin:8px;border:0;border-radius:25px;background:#ffd166;font-size:18px}
.star{color:#ff9800;font-size:22px}
</style>
</head>
<body>
<div class="box">
<h1>🐣 Eggy English Forest V5.2</h1>
<div class="sunny">🐣</div>
<p>冀教版小学英语三年级同步学习</p>
<p class="star">⭐ Stars: <span id="stars">0</span></p>
<div id="app"></div>
</div>
<script src="scripts/game.js"></script>
</body>
</html>
